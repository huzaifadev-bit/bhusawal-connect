name: bhusawal_connect_mobile
description: "A premium hyperlocal super-app Customer, Rider, and Merchant Flutter application skeleton."
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  provider: ^6.1.1

  # Networking & HTTP
  dio: ^5.4.1
  retrofit: ^4.1.0

  # Hardware & Services
  google_maps_flutter: ^2.5.3
  location: ^5.0.3
  socket_io_client: ^2.0.3+1

  # Utils
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
